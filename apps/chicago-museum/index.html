<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Art Gallery · Chicago</title>
  <meta name="description" content="Discover artworks from The Art Institute of Chicago."/>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
  <div id="header"></div>

  <main class="flex-1 container mx-auto px-4 py-6">
    <section class="text-center py-10 md:py-20">
      <h1 class="text-3xl md:text-5xl font-bold tracking-tight">The Art Institute of Chicago</h1>
      <p class="mt-3 text-gray-600">A random encounter with an artwork.</p>
      <form id="hero-search" class="mt-8 max-w-2xl mx-auto flex" role="search">
        <label for="hero-search-input" class="sr-only">Search the collection</label>
        <input
          id="hero-search-input"
          name="q"
          type="search"
          required
          placeholder="Search the collection..."
          class="flex-1 min-w-0 border border-gray-300 rounded-l px-4 py-3 text-lg"
        />
        <button class="bg-black text-white px-6 rounded-r font-medium">Search</button>
      </form>
    </section>

    <section aria-label="Random gallery preview">
      <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </section>
  </main>

  <footer class="border-t py-6 text-center text-sm text-gray-500">
    Source:
    <a href="https://www.artic.edu" class="underline" target="_blank" rel="noopener">artic.edu</a>
  </footer>

  <script type="module" src="./js/pages/home.js"></script>
</body>
</html>
