<!doctype html>
<html lang="en">
<head>

      <div class="grid md:grid-cols-2 gap-8 animate-pulse">
        <div class="aspect-[4/3] bg-gray-200 rounded"></div>
        <div class="space-y-3">
          <div class="h-8 bg-gray-200 w-2/3 rounded"></div>

    <section id="related-section" class="mt-16">

  <footer class="border-t py-6 text-center text-sm text-gray-500 mt-12">
    Source:
